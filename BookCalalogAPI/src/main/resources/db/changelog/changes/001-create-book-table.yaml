databaseChangeLog:
  - changeSet:
      id: 001-create-book-table
      author: shad
      changes:
        - createTable:
            tableName: books
            columns:
              - column:
                  name: id
                  type: uniqueidentifier
                  constraints:
                    nullable: false
                    primaryKey: true

              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: author
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: price
                  type: decimal(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: publishedYear
                  type: smallint
                  constraints:
                    nullable: false
